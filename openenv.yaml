name: email-triage-env
version: 1.0.0
description: A production-grade email triage environment for customer support workflows.
entrypoint: environment.EmailTriageEnv
observation_space:
  subject: string
  body: string
  sender: string
  urgency_hint: string
  intent_hint: string
action_space:
  category: string
  priority: string
  department: string
reward_range: [0.0, 1.0]
tasks:
  - id: easy
    description: Clear, single-intent emails.
  - id: medium
    description: Ambiguous emails requiring multi-field reasoning.
  - id: hard
    description: Multi-intent, noisy emails requiring deep reasoning.
