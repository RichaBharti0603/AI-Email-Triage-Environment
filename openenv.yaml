name: email-triage-env
version: 1.0.0
description: Real-world email triage RL environment for multi-objective classification.
author: AI Triage Team
license: MIT

observation_space:
  email_text: 
    type: string
    description: Raw content of the email.
  previous_action: 
    type: string
    description: The category assigned to the previous email (or "None").

action_space:
  category: 
    type: string
    description: Classification (Spam, Inquiry, Complaint, Request).
  priority: 
    type: string
    description: Priority level (Low, Medium, High, Urgent).
  department: 
    type: string
    description: Target department (Sales, Support, HR, Finance, Tech).

reward_range: [0.0, 1.0]

tasks:
  - id: easy
    description: Direct emails with minimal ambiguity.
  - id: medium
    description: Emails requiring basic reasoning and intent detection.
  - id: hard
    description: Noisy, multi-intent, or deceptive (spam-like) emails.

env_class: environment.EmailTriageEnv
